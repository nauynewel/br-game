<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后室：生存模拟器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a0e;color:#c9c49a;font-family:'Noto Serif SC',serif;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:1000}
#gc{max-width:700px;margin:0 auto;padding:20px;min-height:100vh}
#ts{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;animation:fi 2s}
#ts h1{font-size:3em;color:#e8e0a8;text-shadow:0 0 20px rgba(232,224,168,.3);margin-bottom:10px;letter-spacing:.3em}
.sub{font-family:'Share Tech Mono',monospace;color:#8a8660;font-size:.9em;margin-bottom:15px}
.sh{color:#6a6640;font-size:.85em;animation:bl 2s infinite;cursor:pointer;padding:15px 40px;border:1px solid #3a3820;transition:all .3s;display:inline-block}
.sh:hover{border-color:#8a8660;color:#c9c49a;background:rgba(232,224,168,.05)}
#sb{position:sticky;top:0;background:rgba(26,26,14,.95);border-bottom:1px solid #3a3820;padding:12px 0;z-index:100;backdrop-filter:blur(5px)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-family:'Share Tech Mono',monospace;font-size:.8em}
.si{text-align:center}.sl{color:#6a6640;font-size:.75em;display:block}.sv{color:#c9c49a;font-size:1.1em}
.sv.dg{color:#c44}.sv.wn{color:#ca4}.sv.gd{color:#8a8}
.sbr{height:3px;background:#2a2a1e;margin-top:3px;border-radius:1px;overflow:hidden}
.sbf{height:100%;transition:width .5s,background .5s;border-radius:1px}
.lh{border-bottom:1px solid #3a3820;padding-bottom:15px;margin-bottom:20px}
.ln{font-family:'Share Tech Mono',monospace;color:#6a6640;font-size:.85em}
.lnm{font-size:1.8em;color:#e8e0a8;text-shadow:0 0 15px rgba(232,224,168,.15);margin:5px 0}
.ld{font-family:'Share Tech Mono',monospace;font-size:.8em}
.d1{color:#6a8a4a}.d2{color:#8a8a4a}.d3{color:#aa8a2a}.d4{color:#aa4a2a}.d5{color:#cc2222}
.nar{line-height:1.9;margin:20px 0;padding:15px;background:rgba(50,50,30,.3);border-left:2px solid #3a3820;font-size:.95em}
.evt{color:#aa9a5a;margin:15px 0;padding:10px 15px;border-left:2px solid #5a5430;font-style:italic}
.evt.de{border-color:#8a3a2a;color:#ca7a5a}.evt.ge{border-color:#4a6a3a;color:#8aaa6a}
.chs{margin:25px 0}
.cb{display:block;width:100%;padding:14px 20px;margin:8px 0;background:rgba(50,50,30,.4);border:1px solid #3a3820;color:#c9c49a;font-family:'Noto Serif SC',serif;font-size:.95em;cursor:pointer;text-align:left;transition:all .2s;line-height:1.5}
.cb:hover{background:rgba(80,78,40,.4);border-color:#6a6640;transform:translateX(5px)}
.cb.explore{border-color:#4a5a3a;background:rgba(40,60,30,.3)}.cb.explore:hover{background:rgba(60,80,40,.4);border-color:#6a8a4a}
.cb.rest{border-color:#3a4a5a;background:rgba(30,40,60,.3)}.cb.rest:hover{background:rgba(40,60,80,.4);border-color:#4a6a8a}
.cb.item{border-color:#5a4a3a;background:rgba(60,45,30,.3)}.cb.item:hover{background:rgba(80,60,40,.4);border-color:#8a6a4a}
.ch{font-family:'Share Tech Mono',monospace;font-size:.75em;color:#6a6640;display:block;margin-top:3px}
#hl{margin-top:30px;border-top:1px solid #2a2a1e;padding-top:15px}
.le{font-family:'Share Tech Mono',monospace;font-size:.75em;color:#4a4830;padding:3px 0;border-bottom:1px solid rgba(50,48,30,.3)}
#go{text-align:center;padding:50px 20px;animation:fi 1s}
#go h2{font-size:2em;color:#aa3a2a;margin-bottom:20px}
#go .dc{color:#8a7a5a;margin:15px 0;font-style:italic}
#go .fs{font-family:'Share Tech Mono',monospace;color:#6a6640;margin:20px 0;line-height:2}
.rb{margin-top:30px;padding:12px 40px;background:transparent;border:1px solid #5a3a2a;color:#aa7a5a;font-family:'Noto Serif SC',serif;font-size:1em;cursor:pointer;transition:all .3s}
.rb:hover{border-color:#aa7a5a;background:rgba(170,122,90,.1)}
.sep{border:none;border-top:1px solid #2a2a1e;margin:15px 0}
.inv{margin:15px 0;padding:12px;background:rgba(40,35,20,.4);border:1px solid #3a3520}
.inv-title{font-family:'Share Tech Mono',monospace;font-size:.8em;color:#8a7a4a;margin-bottom:8px}
.inv-grid{display:flex;flex-wrap:wrap;gap:5px}
.inv-item{padding:5px 10px;background:rgba(60,55,30,.5);border:1px solid #4a4520;font-size:.8em;border-radius:2px;cursor:pointer;transition:all .2s}
.inv-item:hover{background:rgba(80,75,40,.6);transform:scale(1.05)}
.inv-item.tier-S{border-color:#8a6a2a;color:#ffd700}.inv-item.tier-A{border-color:#6a3a6a;color:#cc88cc}
.inv-item.tier-B{border-color:#3a5a3a;color:#88cc88}.inv-item.tier-C{border-color:#4a4a3a;color:#aaa}
.obj-find{margin:15px 0;padding:12px 15px;background:rgba(50,45,25,.4);border:1px solid #5a4a20;animation:fi .5s}
.obj-name{font-weight:bold}
.obj-name.tier-S{color:#ffd700}.obj-name.tier-A{color:#cc88cc}.obj-name.tier-B{color:#88cc88}.obj-name.tier-C{color:#aaa}
.obj-find .obj-desc{font-size:.85em;color:#8a8060;margin-top:5px;line-height:1.7}
.obj-find .obj-fx{font-family:'Share Tech Mono',monospace;font-size:.75em;color:#6a8a6a;margin-top:5px}
.buff{font-family:'Share Tech Mono',monospace;font-size:.72em;padding:3px 8px;margin:3px 2px;display:inline-block;border-radius:2px;background:rgba(40,60,40,.4);border:1px solid #4a6a4a;color:#8aaa8a;cursor:pointer;transition:all .2s}
.buff:hover{background:rgba(50,80,50,.5)}
/* Log stat indicators */
.le-stat{float:right;font-size:.9em;opacity:.8}
.le-good .le-stat{color:#6a8a4a}
.le-bad .le-stat{color:#aa5a3a}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:center;justify-content:center;animation:fi .2s}
.modal{background:#2a2a1e;border:1px solid #5a5430;padding:25px;max-width:400px;width:90%;border-radius:4px}
.modal-tier{font-family:'Share Tech Mono',monospace;font-size:.75em;margin-bottom:5px}
.modal-name{font-size:1.4em;font-weight:bold;margin-bottom:10px}
.modal-type{font-size:.8em;opacity:.6;margin-bottom:8px}
.modal-desc{font-size:.9em;line-height:1.8;margin-bottom:12px;opacity:.85}
.modal-stats{font-family:'Share Tech Mono',monospace;font-size:.85em;margin-bottom:8px;padding:8px;background:rgba(0,0,0,.2);border-radius:3px}
.modal-fx{font-family:'Share Tech Mono',monospace;font-size:.8em;opacity:.7;margin-bottom:15px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border:1px solid #4a4520;background:rgba(50,50,30,.5);color:#c9c49a;font-family:'Noto Serif SC',serif;font-size:.9em;cursor:pointer;border-radius:3px;transition:all .2s}
.modal-btn:hover{background:rgba(80,78,40,.5)}
.modal-btn.use{border-color:#4a6a3a;color:#8aaa6a}
.modal-btn.use:hover{background:rgba(40,80,30,.4)}
.modal-btn.drop{border-color:#6a3a3a;color:#aa6a5a}
.modal-btn.drop:hover{background:rgba(80,30,30,.4)}
/* Settings gear button */
.gear-btn{position:fixed;top:12px;right:12px;z-index:200;width:36px;height:36px;border-radius:50%;border:1px solid #3a3820;background:rgba(26,26,14,.8);color:#8a8660;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(5px)}
.gear-btn:hover{background:rgba(50,50,30,.9);color:#c9c49a;transform:rotate(45deg)}
.settings-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1500;display:flex;align-items:center;justify-content:center;animation:fi .2s}
.settings-box{background:#2a2a1e;border:1px solid #5a5430;padding:25px;max-width:360px;width:90%;border-radius:6px}
.settings-box h3{color:#e8e0a8;margin-bottom:15px;font-size:1.1em}
.settings-row{display:flex;align-items:center;justify-content:space-between;margin:12px 0;font-size:.9em}
.settings-row label{color:#8a8660;flex-shrink:0}
.settings-toggle{padding:6px 16px;border:1px solid #4a4520;background:rgba(50,50,30,.5);color:#c9c49a;font-family:'Noto Serif SC',serif;font-size:.85em;cursor:pointer;border-radius:3px;transition:all .2s}
.settings-toggle:hover{background:rgba(80,78,40,.5);border-color:#8a8660}
.settings-slider{width:120px;accent-color:#8a8660}
.settings-val{font-family:'Share Tech Mono',monospace;font-size:.8em;color:#6a6640;min-width:35px;text-align:right}
.settings-close{display:block;width:100%;margin-top:15px;padding:10px;border:1px solid #3a3820;background:rgba(50,50,30,.4);color:#c9c49a;font-family:'Noto Serif SC',serif;cursor:pointer;border-radius:3px;transition:all .2s}
.settings-close:hover{background:rgba(80,78,40,.5)}
/* Light theme — warm ivory + soft brown */
.theme-light{background:#faf8f0;color:#4a4035}
.theme-light::after{background:none}
.theme-light .gear-btn{background:rgba(250,248,240,.85);border-color:#d5cdb5;color:#9a9080}
.theme-light .gear-btn:hover{background:rgba(240,236,220,.95);color:#6a6050}
.theme-light .settings-box{background:#f5f2e8;border-color:#d5cdb5}
.theme-light .settings-box h3{color:#4a4035}
.theme-light .settings-row label{color:#7a7060}
.theme-light .settings-toggle{background:rgba(210,200,175,.4);border-color:#c5bda5;color:#4a4035}
.theme-light .settings-toggle:hover{background:rgba(200,190,165,.6)}
.theme-light .settings-close{background:rgba(210,200,175,.3);border-color:#c5bda5;color:#4a4035}
.theme-light #sb{background:rgba(250,248,240,.95);border-color:#e0d8c0}
.theme-light .sl{color:#9a9080}
.theme-light .sv{color:#4a4035}
.theme-light .sv.dg{color:#c0392b}.theme-light .sv.wn{color:#d4a017}.theme-light .sv.gd{color:#27864a}
.theme-light .lh{border-color:#e0d8c0}
.theme-light .ln{color:#9a9080}
.theme-light .lnm{color:#3a3025;text-shadow:none}
.theme-light .nar{background:rgba(230,225,205,.35);border-color:#c5bda5;color:#5a5045}
.theme-light .evt{color:#6a5a40;border-color:#c5bda5}
.theme-light .evt.de{border-color:#d4644a;color:#b5382a}
.theme-light .evt.ge{border-color:#4a9a5a;color:#1a7a3a}
.theme-light .cb{background:rgba(235,230,210,.4);border-color:#d5cdb5;color:#4a4035}
.theme-light .cb:hover{background:rgba(220,215,195,.55);border-color:#a5a090;transform:translateX(5px)}
.theme-light .cb.explore{border-color:#6a9a5a;background:rgba(80,160,80,.08)}
.theme-light .cb.rest{border-color:#5a7a9a;background:rgba(80,120,180,.08)}
.theme-light .cb.item{border-color:#9a7a5a;background:rgba(180,140,80,.08)}
.theme-light .ch{color:#9a9080}
.theme-light .inv{background:rgba(235,230,210,.35);border-color:#d5cdb5}
.theme-light .inv-title{color:#7a7060}
.theme-light .inv-item{background:rgba(235,230,210,.5);border-color:#d5cdb5}
.theme-light .inv-item:hover{background:rgba(220,215,195,.7)}
.theme-light .inv-item.tier-S{border-color:#c4a020;color:#8a6a00}
.theme-light .inv-item.tier-A{border-color:#8a5a9a;color:#6a3a7a}
.theme-light .inv-item.tier-B{border-color:#4a8a5a;color:#2a6a3a}
.theme-light .inv-item.tier-C{border-color:#a5a090;color:#6a6560}
.theme-light .obj-name.tier-S{color:#9a7a00}.theme-light .obj-name.tier-A{color:#7a4a8a}
.theme-light .obj-name.tier-B{color:#2a7a3a}.theme-light .obj-name.tier-C{color:#6a6560}
.theme-light .le{color:#9a9080;border-color:rgba(210,205,185,.4)}
.theme-light .le-good .le-stat{color:#1a8a2a}
.theme-light .le-bad .le-stat{color:#c0392b}
.theme-light .sep{border-color:#e0d8c0}
.theme-light .obj-find{background:rgba(235,230,210,.4);border-color:#c5b880}
.theme-light .obj-find .obj-desc{color:#5a5040}
.theme-light .obj-find .obj-fx{color:#5a8a5a}
.theme-light .buff{background:rgba(80,150,80,.1);border-color:#6a9a5a;color:#2a7a3a}
.theme-light .sub{color:#9a9080}
.theme-light .sh{color:#7a7060;border-color:#c5bda5}
.theme-light .sh:hover{border-color:#9a9080;color:#4a4035;background:rgba(230,225,205,.4)}
.theme-light .modal-overlay{background:rgba(0,0,0,.4)}
.theme-light .modal{background:#f5f2e8;border-color:#d5cdb5;color:#4a4035}
.theme-light .modal-name{color:#3a3025}
.theme-light .modal-stats{background:rgba(230,225,205,.4)}
.theme-light .modal-btn{background:rgba(235,230,210,.5);border-color:#d5cdb5;color:#4a4035}
.theme-light .modal-btn.use{border-color:#4a9a5a;color:#1a7a3a}
.theme-light .modal-btn.drop{border-color:#c0392b;color:#a52a1a}
.theme-light .sbr{background:#e8e0c8}
.theme-light #go h2{color:#c0392b}
.theme-light #go .dc{color:#7a6a50}
.theme-light #go .fs{color:#7a7060}
.theme-light .rb{border-color:#9a6a4a;color:#9a6a4a}
.theme-light .rb:hover{background:rgba(180,120,80,.1)}
.theme-light .d1{color:#27864a}.theme-light .d2{color:#6a9a2a}.theme-light .d3{color:#c49a00}.theme-light .d4{color:#d45a00}.theme-light .d5{color:#c0392b}
.theme-light .settings-box{background:#f5f2e8;border-color:#d5cdb5;color:#4a4035}
.theme-light .settings-box h3{color:#4a4035}
.theme-light .settings-toggle{background:rgba(210,200,175,.4);border-color:#c5bda5;color:#4a4035}
.theme-light .settings-close{background:rgba(210,200,175,.3);border-color:#c5bda5;color:#4a4035}
.theme-light .settings-row label{color:#7a7060}
.theme-light .settings-slider{accent-color:#9a9080}
.theme-light .settings-val{color:#7a7060}
.theme-light .settings-overlay{background:rgba(0,0,0,.35)}
/* Debug sidebar */
#debug-sidebar{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:#1a1a0e;border-left:1px solid #3a3820;z-index:300;overflow-y:auto;transition:right .3s ease;padding:0}
#debug-sidebar.open{right:0}
.db-header{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid #3a3820;position:sticky;top:0;background:#1a1a0e;z-index:1}
.db-header span{color:#ffd700;font-size:.9em;font-family:'Share Tech Mono',monospace}
.db-close{background:none;border:none;color:#8a8660;font-size:16px;cursor:pointer;padding:5px}
.db-close:hover{color:#c9c49a}
.db-section{padding:12px 15px;border-bottom:1px solid rgba(58,56,32,.5)}
.db-label{color:#8a8660;font-size:.75em;font-family:'Share Tech Mono',monospace;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.db-btns{display:flex;gap:5px;flex-wrap:wrap}
.db-btn{padding:5px 12px;border:1px solid #4a4520;background:rgba(50,50,30,.5);color:#c9c49a;font-family:'Noto Serif SC',serif;font-size:.8em;cursor:pointer;border-radius:3px;transition:all .2s}
.db-btn:hover{background:rgba(80,78,40,.5);border-color:#8a8660}
.db-check{display:flex;align-items:center;gap:8px;font-size:.85em;color:#c9c49a;cursor:pointer}
.db-check input{accent-color:#ffd700}
.db-hint{font-size:.7em;color:#6a6440;margin-top:5px;line-height:1.5}
.db-row{display:flex;gap:5px;align-items:center}
.db-input{padding:5px 8px;background:rgba(50,50,30,.4);border:1px solid #4a4520;color:#c9c49a;font-family:'Share Tech Mono',monospace;font-size:.85em;border-radius:3px;width:60px}
.db-input:focus{outline:none;border-color:#8a8660}
.db-lvlist{margin-top:8px}
.db-details{margin-bottom:5px}
.db-details summary{font-size:.8em;color:#8a8660;cursor:pointer;padding:4px 0}
.db-details summary:hover{color:#c9c49a}
.db-lvgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:5px 0}
.db-lv{padding:4px;text-align:center;font-size:.75em;font-family:'Share Tech Mono',monospace;background:rgba(50,50,30,.3);border:1px solid #3a3820;color:#8a8660;cursor:pointer;border-radius:2px;transition:all .15s}
.db-lv:hover{background:rgba(80,78,40,.5);color:#c9c49a}
.db-lv.visited{background:rgba(40,60,40,.3);border-color:#4a6a4a;color:#6a8a4a}
.db-lv.current{background:rgba(80,70,20,.5);border-color:#aa9a40;color:#ffd700}
.db-itemlist{max-height:200px;overflow-y:auto}
.db-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-bottom:1px solid rgba(58,56,32,.3);cursor:pointer;font-size:.8em;transition:all .15s}
.db-item:hover{background:rgba(80,78,40,.3)}
.db-item.owned{opacity:.4}
.db-item-info{font-size:.75em;color:#6a6440;font-family:'Share Tech Mono',monospace}
.modal-fx-desc{font-size:.8em;color:#6a8a4a;margin-top:4px;padding:6px 8px;background:rgba(40,60,40,.2);border-radius:3px;line-height:1.6}
.debug-gear{position:fixed;top:12px;right:52px;z-index:200;width:36px;height:36px;border-radius:50%;border:1px solid #5a4a20;background:rgba(50,40,10,.8);color:#ffd700;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(5px)}
.debug-gear:hover{background:rgba(80,60,10,.9);transform:rotate(45deg)}
.debug-on .debug-gear{display:flex}
/* Light theme debug */
.theme-light #debug-sidebar{background:#f5f2e8;border-color:#d5cdb5}
.theme-light .db-header{background:#f5f2e8;border-color:#d5cdb5}
.theme-light .db-header span{color:#9a7a00}
.theme-light .db-close{color:#9a9080}
.theme-light .db-section{border-color:rgba(210,200,175,.5)}
.theme-light .db-label{color:#9a9080}
.theme-light .db-btn{background:rgba(210,200,175,.4);border-color:#c5bda5;color:#4a4035}
.theme-light .db-btn:hover{background:rgba(200,190,165,.6)}
.theme-light .db-check{color:#4a4035}
.theme-light .db-hint{color:#9a9080}
.theme-light .db-input{background:rgba(210,200,175,.3);border-color:#c5bda5;color:#4a4035}
.theme-light .db-details summary{color:#9a9080}
.theme-light .db-lv{background:rgba(210,200,175,.2);border-color:#d5cdb5;color:#9a9080}
.theme-light .db-lv:hover{background:rgba(200,190,165,.4);color:#4a4035}
.theme-light .db-lv.visited{background:rgba(80,160,80,.1);border-color:#6a9a5a;color:#2a7a3a}
.theme-light .db-lv.current{background:rgba(200,170,40,.2);border-color:#c4a020;color:#9a7a00}
.theme-light .db-item{border-color:rgba(210,200,175,.3);color:#4a4035}
.theme-light .db-item:hover{background:rgba(210,200,175,.3)}
.theme-light .db-item-info{color:#9a9080}
.theme-light .debug-gear{background:rgba(250,248,240,.85);border-color:#c4a020;color:#9a7a00}
.theme-light .debug-gear:hover{background:rgba(240,236,220,.95)}
.theme-light .modal-fx-desc{color:#2a7a3a;background:rgba(80,160,80,.08)}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:600px){#gc{padding:10px}.sg{grid-template-columns:repeat(2,1fr)}#ts h1{font-size:2em}.lnm{font-size:1.4em}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#1a1a0e}::-webkit-scrollbar-thumb{background:#3a3820;border-radius:3px}
.theme-light::-webkit-scrollbar-track{background:#f5f3e8}.theme-light::-webkit-scrollbar-thumb{background:#c0b980}
</style>
</head>
<body>
<div id="gc">
<button class="gear-btn" onclick="toggleSettings()">⚙</button>
<button class="debug-gear" onclick="toggleDebugSidebar()">🔧</button>

const EV={"0": {"description": "你睁开眼，发现自己身处一片无尽的黄色房间中。潮湿的地毯散发着霉味，荧光灯嗡嗡作响。大约六亿平方英里随机分割的空荡房间，没有窗户，没有出口。欢迎来到后室。", "enterEvents": [{"t": "d", "x": "你误入了一间有着红色墙纸和昏暗灯光的房间。一股强烈的不安感瞬间笼罩了你——绝对不能待在这里！你转身就跑。", "s": -25, "m": -15, "c": 0.04}, {"t": "d", "x": "你确信看到了另一个流浪者的身影。但你想起来——Level 0里不应该有其他人类。那不是人。", "s": -20, "m": -5, "c": 0.08}, {"t": "n", "x": "荧光灯的嗡鸣声突然增大到震耳欲聋的程度，你捂住耳朵蹲在地上。然后，一切突然归于死寂。", "s": -10, "m": -3, "c": 0.15}, {"t": "n", "x": "你产生了强烈的既视感。这个房间……你确定自己来过。但沿原路返回时，一切都变了。", "s": -8, "m": -2, "c": 0.15}, {"t": "n", "x": "用余光你看到墙纸下有什么东西在蠕动爬行。当你直接注视时，墙壁又恢复了平静。", "s": -8, "m": 0, "c": 0.12}, {"t": "n", "x": "你听到了类似人类说话的声音，但内容不属于任何已知语言。声音时远时近。", "s": -10, "m": 0, "c": 0.1}], "exploreEvents": [{"t": "g", "x": "经过漫长的跋涉，你发现了传说中的马尼拉房间！这里有其他流浪者，还有M.E.G.留下的文档。你获得了关于后室的关键信息，也感受到了不再孤独的温暖。", "s": 20, "m": 15, "c": 0.06}, {"t": "n", "x": "你观察到一扇门凭空出现在墙壁上，但当你靠近时它消失了。这只是Level 0常见的幻觉。", "s": -5, "m": -2, "c": 0.1}, {"t": "d", "x": "你试图饮用浸湿地毯的液体来解渴，但它不是水。喝下后你感到强烈的恶心。", "s": -5, "m": -15, "c": 0.05}]}, "1": {"description": "Level 1，「宜居地带」。这个地方让你感到不安，但你必须继续前进。", "enterEvents": [{"t": "n", "x": "一种难以名状的不安感笼罩着你。你加快了脚步。", "s": -5, "m": -5, "c": 0.15}, {"t": "d", "x": "你听到了不该存在的声音。直觉告诉你这里不安全。", "s": -12, "m": -8, "c": 0.1}], "exploreEvents": [{"t": "g", "x": "你在 Level 1 深处发现了一个相对安全的区域。短暂休整让你恢复了一些精力。", "s": 8, "m": 12, "c": 0.07}, {"t": "d", "x": "你探索得太深了。返回时周围环境已变，你花了很长时间才脱身。", "s": -10, "m": -12, "c": 0.08}]}, "2": {"description": "你踏入了 Level 2——「废弃公共带」。四周的景象与之前截然不同。你不知道这是好事还是坏事。", "enterEvents": [{"t": "d", "x": "Level 2中潜伏着未知实体。你听到了它们的声音，必须尽快隐蔽。", "s": -15, "m": -10, "c": 0.12}, {"t": "d", "x": "四周陷入黑暗，你不得不在看不见的环境中艰难前行。", "s": -12, "m": -8, "c": 0.14}, {"t": "n", "x": "这里到处都是水。潮湿的环境让你的衣物越来越沉重。", "s": -5, "m": -10, "c": 0.12}, {"t": "d", "x": "极端的高温让你大量出汗，身体迅速脱水。", "s": -8, "m": -18, "c": 0.1}, {"t": "d", "x": "刺骨的寒冷侵入骨髓。你的手指开始失去知觉。", "s": -8, "m": -15, "c": 0.1}, {"t": "g", "x": "这里的氛围出奇地平和。你紧绷的神经终于放松了一些。", "s": 10, "m": 8, "c": 0.12}, {"t": "n", "x": "持续不断的噪音让你的头隐隐作痛。", "s": -8, "m": -3 const OB=[{"id": 1, "name": "杏仁水", "tier": "C", "type": "consumable", "desc": "后室中最常见也最重要的补给品。清澈液体装在金属保温瓶中，饮用可恢复体力。注意：未满的瓶子可能被掺入有害物质，不要饮用。", "use": "你拧开保温瓶，一口气喝下杏仁水。温热的液体流过喉咙，疲惫感消退了不少。", "san": 5, "sta": 25, "rarity": 0.15, "levels": "all", "effect": null}, {"id": 44, "name": "腰果水", "tier": "C", "type": "danger", "desc": "外观与杏仁水几乎一致，但散发腰果气味。饮用会导致体温骤降、肌肉萎缩。更糟的是，它的气味会吸引实体。pH值9.0，紫外线下呈猩红色。", "use": "你喝下了那瓶液体——等等，这不是杏仁水！是腰果水！身体开始不受控制地发冷，你听到远处有什么东西被气味吸引过来了……", "san": -8, "sta": -20, "rarity": 0.06, "levels": "all", "effect": "attract"}, {"id": 5, "name": "糖果", "tier": "C", "type": "consumable", "desc": "后室中散落的各种糖果，种类繁多。有些能让你短暂失去触觉，有些居然是枪形的。效果未知，全凭运气。", "use": "你吃下一颗糖果……", "san": 0, "sta": 0, "rarity": 0.1, "levels": "all", "effect": "gamble"}, {"id": 30, "name": "油腻棉花糖", "tier": "C", "type": "consumable", "desc": "一坨油腻腻的棉花糖。口感很差，但总比饿死好。", "use": "你勉强吃下了油腻的棉花糖。差点没吐出来，但肚子确实不那么饿了。", "san": -2, "sta": 12, "rarity": 0.09, "levels": "all", "effect": null}, {"id": 67, "name": "巧克力排", "tier": "C", "type": "consumable", "desc": "包装完好的巧克力棒。在后室中，一块正常的巧克力就是最好的心灵慰藉。", "use": "你咬下巧克力——浓郁的可可味让你短暂地回忆起正常世界。眼眶有点湿润。", "san": 12, "sta": 8, "rarity": 0.08, "levels": "all", "effect": null}, {"id": 9, "name": "傻瓜口香糖", "tier": "C", "type": "consumable", "desc": "嚼起来味道不错的口香糖，但嚼太久会让思维变得迟缓。适量使用没什么问题。", "use": "你嚼了一块口香糖。薄荷味还不错，虽然脑子好像慢了半拍。", "san": -3, "sta": 5, "rarity": 0.08, "levels": "all", "effect": null}, {"id": 16, "name": "皇家口粮", "tier": "C", "type": "consumable", "desc": "M.E.G.分发的标准口粮，营养均衡，能有效恢复体力。口感像纸板。", "use": "你吃下皇家口粮。味同嚼蜡，但身体确实在恢复。标准化的味道，标准化的效果。", "san": 2, "sta": 22, "rarity": 0.07, "levels": "all", "effect": null}, {"id": 37, "name": "星形糖", "tier": "B", "type": "consumable", "desc": "星星形状的荧光糖果。入口即化，甜而不腻。散发的微光还能短暂照亮周围。", "use": "你吃下星形糖，温暖的光从口中扩散到全身。黑暗中，你自己也发出了微弱的光芒。", "san": 10, "sta": 8, "rarity": 0.06, "levels": "all", "effect": "light"}, {"id": 15, "name": "火盐", "tier": "B", "type": "weapon", "desc": "橙色半透明晶体，莫氏硬度7但极脆。撞击地面会爆炸。47°C即融化成「火油」，低氧环境也能燃烧。后室中最实用的武器之一。", "use": "你将火盐掷向威胁——晶体碎裂的瞬间，明亮的火焰吞噬了一切。热浪扑面而来。", "san": 5, "sta": -5, "rarity": 0.05, "levels": "all", "effect": "shield"}, {"id": 17, "name": "寂静汁液", "tier": "B", "type": "consumable", "desc": "粘稠的紫色液体。饮用后暂时完全失聪，但能免受一切声音类异常的影响——嗡鸣、低语、尖叫都无法伤害你。", "use": "你喝下寂静汁液——世界瞬间安静了。嗡鸣消失了，低语消失了，一切声音都消失了。", "san": 10, "sta": -5, "rarity": 0.05, "levels": "all", "effect": "immunity_sound"}, {"id": 8, "name": "小台灯", "tier": "B", "type": "tool", "desc": "一盏不知从哪里来的小台灯，能提供稳定光源。在Level 6等黑暗层级中，它可能是你和死亡之间唯一的屏障。", "use": "你点亮小台灯，温暖的光芒驱散了黑暗。那些潜伏在暗处的东西退缩了。", "san": 15, "sta": 0, "rarity": 0.05, "levels": "6,7,8", "effect": "light"}, {"id": 28, "name": "幸运豆奶", "tier": "B", "type": "consumable", "desc": "普通外表的豆奶。喝下后你的运气会暂时变好——更容易找到物资，更容易避开危险。", "use": "你喝下幸运豆奶。说不上为什么，你觉得接下来的路会顺利一些。", "san": 5, "sta": 8, "rarity": 0.05, "levels": "all", "effect": "double_find"}, {"id": 77, "name": "全自主便携式收音机", "tier": "B", "type": "tool", "desc": "不需要电池就能运转的收音机。有时能收到其他流浪者的广播。在孤独的后室中，另一个人的声音比任何补给都珍贵。", "use": "你打开收音机——静电中，一个声音说：「如果有人能听到……你不是一个人。」", "san": 15, "sta": 0, "rarity": 0.04, "levels": "all", "effect": null}, {"id": 35, "name": "暗黑修复瓶", "tier": "B", "type": "consumable", "desc": "瓶中的黑色液体能加速伤口愈合，代价是暂时失去视觉。在安全区域使用最佳。", "use": "你喝下黑色液体，伤口以肉眼可见的速度愈合。但你的视线陷入了黑暗——几分钟后才恢复。", "san": -5, "sta": 25, "rarity": 0.04, "levels": "all", "effect": null}, {"id": 34, "name": "盒式录音机", "tier": "B", "type": "tool", "desc": "还能播放的录音机，磁带里录着前人的生存指南、层级信息和临终遗言。信息就是生命。", "use": "你按下播放——一个疲惫的声音开始讲述生存经验：「在Level 6，千万不要追随光……」", "san": 10, "sta": 0, "rarity": 0.04, "levels": "all", "effect": "detect"}, {"id": 23, "name": "爆团弹", "tier": "B", "type": "weapon", "desc": "小型爆炸弹药。可以炸开障碍物或驱散成群实体。声音很大，可能引来更多麻烦。", "use": "你投出爆团弹——轰！冲击波将前方的障碍炸开，碎片四溅。你的耳朵嗡嗡作响。", "san": -3, "sta": -3, "rarity": 0.04, "levels": "all", "effect": "shield"}, {"id": 73, "name": "超级绿色超级苹果", "tier": "B", "type": "consumable", "desc": "一个鲜绿色的苹果，散发不自然的荧光。口感脆甜多汁，恢复效果惊人。来源未知。", "use": "你一口咬下——清脆、多汁、甜美。这是你在后室中吃过的最好的东西。", "san": 5, "sta": 30, "rarity": 0.04, "levels": "all", "effect": null}, {"id": 85, "name": "亚格鲁格亚果", "tier": "B", "type": "consumable", "desc": "外形怪异的果实，味道极苦。营养价值极高，是后室中热量密度最大的天然食物之一。", "use": "你硬着头皮咬了一口——苦到眼泪都出来了。但你能感觉到力量在恢复。", "san": -3, "sta": 28, "rarity": 0.04, "levels": "all", "effect": null}, {"id": 27, "name": "尤米的糖", "tier": "B", "type": "consumable", "desc": "散发奇异光芒的糖果。吃下后会陷入一个关于家的美梦，醒来时理智大幅恢复，但身体依然疲倦。", "use": "你吃下尤米的糖……眼前浮现出家的画面。阳光、饭菜的香味、熟悉的笑声。醒来时，你发现自己在流泪。", "san": 20, "sta": -8, "rarity": 0.04, "levels": "all", "effect": null}, {"id": 92, "name": "切行健", "tier": "B", "type": "consumable", "desc": "一种专门为noclip研发的药剂。饮用后身体会变轻，更容易穿过墙壁切入其他层级。", "use": "你喝下切行健——身体变得像纸一样轻。墙壁似乎不再那么坚实了。", "san": 0, "sta": 5, "rarity": 0.04, "levels": "all", "effect": "noclip_boost"}, {"id": 2, "name": "层级钥匙", "tier": "A", "type": "tool", "desc": "每把钥匙对应一个特定层级，外观反映来源层级的特征。插入锁中顺时针旋转三圈，门就会通向对应层级。使用次数无限。", "use": "你将层级钥匙插入锁孔，顺时针旋转三圈——咔嗒。门打开了，另一边是完全不同的景象。", "san": 8, "sta": 0, "rarity": 0.025, "levels": "all", "effect": "unlock"}, {"id": 32, "name": "现实清新剂", "tier": "A", "type": "consumable", "desc": "喷雾剂，能暂时恢复周围环境的现实感。扭曲的空间会稳定，幻觉会消散。对理智恢复效果极佳。", "use": "你按下喷头——清凉的气雾扩散开来。墙壁不再扭曲，影子回到了正确的位置。你的头脑前所未有地清醒。", "san": 25, "sta": 0, "rarity": 0.025, "levels": "all", "effect": null}, {"id": 45, "name": "阿里阿德涅之弦", "tier": "A", "type": "tool", "desc": "发光的丝线，来自制图者共和国。持有时能感知危险方向，在迷宫层级中找到正确的路。在Level 7它甚至帮助发现了第一个出口。但在Level 85会产生反效果。", "use": "你放出阿里阿德涅之弦——金色丝线在黑暗中延伸，为你指引方向。你感觉到了哪里是安全的。", "san": 12, "sta": 5, "rarity": 0.02, "levels": "all", "effect": "detect"}, {"id": 19, "name": "滋水枪", "tier": "A", "type": "weapon", "desc": "射出腐蚀性液体的水枪，对实体有极强效果。弹药有限但威力巨大。持有它让你安心不少。", "use": "你举起滋水枪——腐蚀性液体喷射而出，逼近的阴影发出刺耳的嘶鸣后退缩了。", "san": 8, "sta": 0, "rarity": 0.02, "levels": "all", "effect": "shield"}, {"id": 75, "name": "契诃夫之枪", "tier": "A", "type": "weapon", "desc": "一把看起来很旧的手枪。据说它「一定会在关键时刻派上用场」。子弹数量未知，但它从不会在你最需要的时候卡壳。", "use": "你举起契诃夫之枪——枪响了。你不知道打中了什么，但威胁消失了。这把枪果然名不虚传。", "san": 12, "sta": 0, "rarity": 0.02, "levels": "all", "effect": "shield"}, {"id": 57, "name": "深红地图", "tier": "A", "type": "tool", "desc": "泛着红光的地图，能实时显示附近实体的位置。看久了会头痛，但这点代价换来的是对危险的预知。", "use": "你展开深红地图——红色光点在纸面上移动，标示出每一个潜伏的威胁。知己知彼。", "san": -5, "sta": 0, "rarity": 0.02, "levels": "all", "effect": "detect"}, {"id": 42, "name": "瓶装闪电", "tier": "A", "type": "weapon", "desc": "透明瓶中封印着跳动的闪电。打碎瓶子的瞬间，电弧会扫荡整个区域。一次性使用，但威力惊人。", "use": "你将瓶子砸向地面——刺目的电弧在走廊中炸开，雷鸣般的轰响震耳欲聋。一切威胁都被清除了。", "san": 5, "sta": -3, "rarity": 0.02, "levels": "all", "effect": "shield"}, {"id": 33, "name": "机械宠物", "tier": "A", "type": "tool", "desc": "小型机械动物。会跟随你，在危险靠近时发出警报。它不会说话，但忠诚无比。在后室中，一个同伴的价值无可估量。", "use": "一只小机械猫从箱子里跳出来，蹭了蹭你的脚踝。它的眼睛发出柔和的蓝光。你不再孤独了。", "san": 18, "sta": 5, "rarity": 0.02, "levels": "all", "effect": "detect"}, {"id": 82, "name": "圣晶", "tier": "A", "type": "tool", "desc": "散发柔和光芒的水晶。握住它时，扭曲的现实会暂时恢复正常。可持续使用但会消耗体力。", "use": "你握住圣晶——温暖的光渗入掌心。焦虑和恐惧开始消退，世界变得清晰了。", "san": 18, "sta": -8, "rarity": 0.02, "levels": "all", "effect": null}, {"id": 74, "name": "迁跃浆果", "tier": "A", "type": "special", "desc": "蓝色浆果。吃下后会被传送到你第一次发现它的地方——也就是说，会把你随机传送到某个层级。赌一把？", "use": "你吃下迁跃浆果——空间扭曲、翻转、重组。当你再次睁开眼时，你已经在别的地方了。", "san": -5, "sta": 5, "rarity": 0.025, "levels": "all", "effect": "teleport"}, {"id": 4, "name": "反欧几里得装置", "tier": "S", "type": "tool", "desc": "能抵消后室非欧几里得空间效应的高科技装置。启动后，迷宫般的空间会暂时变得可以理解和导航。", "use": "你启动装置——嗡的一声，空间中的扭曲波纹消失了。走廊不再循环，房间不再重叠。你终于能看清这里的真实结构。", "san": 20, "sta": 0, "rarity": 0.01, "levels": "all", "effect": "detect"}, {"id": 100, "name": "超级杏仁水", "tier": "S", "type": "consumable", "desc": "杏仁水的传说级强化版本。发光的金色液体，饮用后能全面恢复身体状态。极其稀有，被视为后室中的圣物。", "use": "你喝下超级杏仁水——金色的暖流从体内扩散。伤痛消退，疲惫消散，连恐惧都暂时远去了。", "san": 25, "sta": 45, "rarity": 0.008, "levels": "all", "effect": null}, {"id": 6, "name": "镜子", "tier": "B", "type": "danger", "desc": "看起来普通的镜子。但倒影有自己的意志——它会模仿你，然后做出你没做过的动作。盯着看太久，你会分不清哪个是真的你。", "use": "你不小心直视了镜子——倒影中的你缓缓露出了笑容。但你没有在笑。你猛地移开视线，但那个笑容已经烙在了你的脑海里。", "san": -22, "sta": 0, "rarity": 0.04, "levels": "all", "effect": null}, {"id": 10, "name": "稻草人", "tier": "B", "type": "danger", "desc": "角落里静立的稻草人。你每次背对它，它都会离你更近一点。千万不要让它碰到你。千万不要背对它太久。", "use": "你感觉背后有什么不对。缓缓回头——稻草人站在你身后一步之遥的地方，草编的脸上缝着一个微笑。", "san": -20, "sta": -12, "rarity": 0.03, "levels": "all", "effect": null}, {"id": 20, "name": "瑞撒毒气", "tier": "A", "type": "danger", "desc": "致命的黄绿色气体。即使少量吸入也会造成严重的呼吸道和神经损伤。一旦发现，立即逃离。", "use": "空气中弥漫着刺鼻的黄绿色气体——瑞撒毒气！你捂住口鼻拼命奔跑，但还是吸入了一些。肺部像被火烧一样疼。", "san": -10, "sta": -28, "rarity": 0.025, "levels": "all", "effect": null}, {"id": 48, "name": "液态痛苦", "tier": "A", "type": "danger", "desc": "暗红色的液体。任何接触都会带来纯粹的、极致的痛苦。有传言说经历过这种痛苦后，你会变得更强——但大多数人在痛苦中失去了意识。", "use": "液态痛苦溅到你的皮肤上——世界变成了白色。你从未经历过如此纯粹的疼痛。当你恢复意识时，你发现自己倒在地上，全身冷汗。", "san": -25, "sta": -22, "rarity": 0.015, "levels": "all", "effect": null}, {"id": 7, "name": "记忆罐", "tier": "B", "type": "special", "desc": "小罐子里封存着某个人的记忆碎片。打开它会经历别人的回忆——可能是温馨的，也可能是恐怖的。", "use": "你打开记忆罐——", "san": 0, "sta": 0, "rarity": 0.03, "levels": "all", "effect": "gamble"}, {"id": 43, "name": "塔罗牌组", "tier": "A", "type": "special", "desc": "后室版塔罗牌。每张牌都描绘着后室中的场景和实体。抽一张，命运会给你答案——好坏参半。", "use": "你从牌组中抽出一张——", "san": 0, "sta": 0, "rarity": 0.02, "levels": "all", "effect": "gamble"}, {"id": 39, "name": "无限之书", "tier": "A", "type": "special", "desc": "页数无限的书。每次翻开都是全新的内容——生存指南、层级地图、个人日记，或是让人发疯的文字。", "use": "你翻开无限之书——", "san": 0, "sta": 0, "rarity": 0.02, "levels": "all", "effect": "gamble"}, {"id": 666, "name": "命运之骰", "tier": "S", "type": "danger", "desc": "来自Level 5.1赌场的纪念品。投掷后会以扭曲的方式实现你的愿望——有人想看电影，被变成了电影院的椅子。有人想要自由，被变成了风。绝对不要使用。", "use": "你投掷了命运之骰——它在地上旋转，旋转，不自然地久久不停。当它终于停下时，你感到了某种深入骨髓的、不可逆的变化正在发生……", "san": -35, "sta": -30, "rarity": 0.005, "levels": "5", "effect": "gamble"}, {"id": 99, "name": "[禁止访问]", "tier": "S", "type": "danger", "desc": "[数据删除]。一切关于此物品的记录都被删除了。不要尝试了解更多。不要使用。不要触碰。不要阅读。", "use": "你触碰了不该触碰的东西。[数据删除]。你感觉自己的存在正在被——", "san": -40, "sta": -30, "rarity": 0.003, "levels": "all", "effect": null}, {"id": 56, "name": "后室终极食谱", "tier": "B", "type": "tool", "desc": "记录了如何用后室材料制作食物的食谱。比如用杏仁水和某种菌类可以做出营养汤。知识本身就是武器。", "use": "你翻阅食谱，学会了一种用常见材料恢复体力的方法。虽然味道可能不太好……", "san": 5, "sta": 10, "rarity": 0.04, "levels": "all", "effect": null}];
const DL=['','安全','低危','中危','高危','致命'];

const EDESC={shield:'受到的理智和体力伤害减半',detect:'进入层级时自动避开危险事件，只触发中性/有利事件',light:'在黑暗层级（Level 6/7/8）中受到的伤害减半',double_find:'探索时物品发现概率提高至2.5倍',immunity_sound:'免疫所有与声音相关的负面事件',noclip_boost:'使用noclip切出时消耗的理智和体力减半',attract:'吸引附近的实体向你靠近，造成额外伤害',gamble:'触发一个随机结果，可能好也可能坏',teleport:'随机传送到另一个层级',unlock:'在当前层级开启一条通往随机层级的新通道'};
const GRE=[{t:"d",x:"你听到身后传来沉重的脚步声，不得不拼命奔跑。",s:-15,m:-20,c:.08},{t:"d",x:"一股无形的力量试图拉扯你的意识。",s:-25,m:0,c:.05},{t:"n",x:"时间在这里失去了意义。",s:-5,m:-3,c:.08}];
const MAX_INV=8;
let S={lv:0,san:100,sta:100,tn:0,mx:0,vis:new Set(),log:[],evts:0,inv:[],objFound:0,buffs:{},pendingObj:null,debugEventOnly:false};
let CFG={theme:'dark',fontSize:16,debug:false};

// --- Settings ---
function loadCfg(){try{var c=JSON.parse(localStorage.getItem('br_cfg'));if(c){CFG=Object.assign(CFG,c);}}catch(e){}}
function saveCfg(){try{localStorage.setItem('br_cfg',JSON.stringify(CFG));}catch(e){}}
function applyTheme(){
document.body.className=(CFG.theme==='light'?'theme-light':'')+(CFG.debug?' debug-on':'');
document.documentElement.style.fontSize=CFG.fontSize+'px';
saveCfg();
}
function toggleTheme(){CFG.theme=CFG.theme==='dark'?'light':'dark';applyTheme();}
function setFontSize(v){CFG.fontSize=cl(parseInt(v),12,24);applyTheme();var el=document.getElementById('fs-val');if(el)el.textContent=CFG.fontSize+'px';}
function toggleSettings(){
var existing=document.querySelector('.settings-overlay');
if(existing){existing.remove();return;}
var overlay=document.createElement('div');
overlay.className='settings-overlay';
overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
overlay.innerHTML='<div class="settings-box">'+
'<h3>⚙ 设置</h3>'+
'<div class="settings-row"><label>主题</label><button class="settings-toggle" onclick="toggleTheme();this.textContent=CFG.theme===\'dark\'?\'🌙 暗色（后室风格）\':\'☀️ 亮色（护眼模式）\'">'+(CFG.theme==='dark'?'🌙 暗色（后室风格）':'☀️ 亮色（护眼模式）')+'</button></div>'+
'<div class="settings-row"><label>字体大小</label><input type="range" class="settings-slider" min="12" max="24" value="'+CFG.fontSize+'" oninput="setFontSize(this.value)"><span class="settings-val" id="fs-val">'+CFG.fontSize+'px</span></div>'+
'<div class="settings-row"><label>神秘代码</label><input type="password" maxlength="5" id="pin-input" placeholder="· · · · ·" style="width:80px;padding:5px 8px;background:rgba(50,50,30,.4);border:1px solid #4a4520;color:#c9c49a;font-family:Share Tech Mono,monospace;text-align:center;border-radius:3px;font-size:.9em" onkeyup="checkPin(this.value)"><span id="pin-status" style="font-size:.75em;margin-left:8px">'+(CFG.debug?'<span style="color:#ffd700">✓ 已激活</span>':'')+'</span></div>'+
'<button class="settings-close" onclick="this.closest(\'.settings-overlay\').remove()">关闭</button>'+
'</div>';
document.body.appendChild(overlay);
}
function checkPin(v){
var el=document.getElementById('pin-status');
if(v.length<5){if(el)el.textContent='';return;}
if(v==='Panda'){
CFG.debug=true;saveCfg();applyTheme();
if(el)el.innerHTML='<span style="color:#ffd700">✓ 已激活</span>';
setTimeout(function(){var ov=document.querySelector('.settings-overlay');if(ov)ov.remove();},400);
}else{if(el)el.innerHTML='<span style="color:#aa4a3a">✗</span>';}
}

// --- Debug sidebar ---
function toggleDebugSidebar(){
var sb=document.getElementById('debug-sidebar');
if(!sb)return;
sb.classList.toggle('open');
if(sb.classList.contains('open'))renderDebugSidebar();
}
function renderDebugSidebar(){
var sb=document.getElementById('debug-sidebar');if(!sb)return;
var h='<div class="db-header"><span>🔧 调试面板</span><button class="db-close" onclick="toggleDebugSidebar()">✕</button></div>';
// Quick actions
h+='<div class="db-section"><div class="db-label">快捷操作</div>';
h+='<div class="db-btns">';
h+='<button class="db-btn" onclick="S.san=100;S.sta=100;us();al(\'[调试] 属性已满\')">回满属性</button>';
h+='<button class="db-btn" onclick="S.san+=30;S.sta+=30;us();al(\'[调试] +30\',30,30)">+30</button>';
h+='</div></div>';
// Event-only mode
h+='<div class="db-section"><div class="db-label">探索模式</div>';
h+='<label class="db-check"><input type="checkbox" '+(S.debugEventOnly?'checked':'')+' onchange="S.debugEventOnly=this.checked"> 仅触发层级特殊事件</label>';
h+='<div class="db-hint">开启后探索只触发当前层级专属事件，不触发通用事件和物品获取</div>';
h+='</div>';
// Level teleport
h+='<div class="db-section"><div class="db-label">层级跳转</div>';
h+='<div class="db-row"><input type="number" id="db-level" min="0" max="99" value="'+S.lv+'" class="db-input" placeholder="0-99"><button class="db-btn" onclick="var v=parseInt(document.getElementById(\'db-level\').value);if(v>=0&&v<=99){toggleDebugSidebar();enterLevel(v);}">跳转</button></div>';
h+='<div class="db-lvlist">';
var lvGroups=[[0,24,'L0-24'],[25,49,'L25-49'],[50,74,'L50-74'],[75,99,'L75-99']];
for(var g=0;g<lvGroups.length;g++){
h+='<details class="db-details"><summary>'+lvGroups[g][2]+'</summary><div class="db-lvgrid">';
for(var i=lvGroups[g][0];i<=lvGroups[g][1];i++){
var ld=gl(i),vi=S.vis.has(i);
h+='<button class="db-lv'+(vi?' visited':'')+(i===S.lv?' current':'')+'" onclick="toggleDebugSidebar();enterLevel('+i+')" title="'+ld.name+' ('+DL[ld.danger]+')">'+i+'</button>';
}
h+='</div></details>';
}
h+='</div></div>';
// Item picker
h+='<div class="db-section"><div class="db-label">物品添加 ('+S.inv.length+'/'+MAX_INV+')</div>';
h+='<input type="text" id="db-item-search" class="db-input" placeholder="搜索物品名称..." oninput="filterDebugItems(this.value)" style="width:100%;margin-bottom:8px">';
var tiers=['S','A','B','C'];
for(var ti=0;ti<tiers.length;ti++){
var t=tiers[ti],items=OB.filter(function(o){return o.tier===t;});
h+='<details class="db-details"><summary class="tier-'+t+'">'+TC[t]+' ('+items.length+')</summary><div class="db-itemlist">';
for(var j=0;j<items.length;j++){
var ob=items[j],inInv=S.inv.find(function(x){return x.id===ob.id;});
h+='<div class="db-item'+(inInv?' owned':'')+'" data-name="'+ob.name+'" onclick="debugPickItem('+ob.id+')">';
h+='<span class="tier-'+ob.tier+'">'+ob.name+'</span>';
h+='<span class="db-item-info">'+({consumable:'消耗',weapon:'武器',tool:'工具',danger:'危险',special:'特殊'}[ob.type]||ob.type)+'</span>';
h+='</div>';
}
h+='</div></details>';
}
h+='</div>';
sb.innerHTML=h;
}
function filterDebugItems(q){
q=q.toLowerCase();
var items=document.querySelectorAll('.db-item');
items.forEach(function(el){
var name=el.getAttribute('data-name').toLowerCase();
el.style.display=(!q||name.indexOf(q)>=0)?'':'none';
});
}
function debugPickItem(id){
if(S.inv.length>=MAX_INV){al('[调试] 背包已满');return;}
var obj=OB.find(function(o){return o.id===id;});
if(!obj)return;
if(S.inv.find(function(x){return x.id===id;})){al('[调试] 已拥有 '+obj.name);return;}
var copy={};for(var k in obj)copy[k]=obj[k];S.inv.push(copy);
al('[调试] 获得 ['+obj.tier+'] '+obj.name);us();
renderDebugSidebar();
renderLevel(gl(S.lv),ge(S.lv),null,true,S.pendingObj);
}

// --- Log with san/sta changes ---
function al(t,dSan,dSta){
var suffix='';
if(dSan&&dSan!==0)suffix+=' 🧠'+(dSan>0?'+':'')+dSan;
if(dSta&&dSta!==0)suffix+=' 💪'+(dSta>0?'+':'')+dSta;
var cls=suffix?((dSan<0||dSta<0)?'le-bad':'le-good'):'';
S.log.unshift({tn:S.tn,text:t,suffix:suffix,cls:cls});
if(S.log.length>30)S.log.pop();
var hl=document.getElementById('hl');if(!hl)return;
hl.innerHTML=S.log.map(function(l){return '<div class="le '+l.cls+'">['+l.tn+'] '+l.text+(l.suffix?'<span class="le-stat">'+l.suffix+'</span>':'')+'</div>';}).join('');
}

// --- Item detail modal ---
function showItemModal(idx){
var item=S.inv[idx];if(!item)return;
var tierName=TC[item.tier]||'?';
var fxDesc=item.effect&&ENAMES[item.effect]?ENAMES[item.effect]:'无特殊效果';
var fxDetail=item.effect&&EDESC[item.effect]?'<div class="modal-fx-desc">'+EDESC[item.effect]+'</div>':'';
var sanLabel=item.san>0?'<span style="color:#6a8a4a">理智 +'+item.san+'</span>':item.san<0?'<span style="color:#aa4a2a">理智 '+item.san+'</span>':'';
var staLabel=item.sta>0?'<span style="color:#4a6a8a">体力 +'+item.sta+'</span>':item.sta<0?'<span style="color:#aa4a2a">体力 '+item.sta+'</span>':'';
var statsLine=[sanLabel,staLabel].filter(Boolean).join(' · ')||'无属性变化';
var overlay=document.createElement('div');
overlay.className='modal-overlay';
overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
overlay.innerHTML='<div class="modal">'+
'<div class="modal-tier tier-'+item.tier+'">['+tierName+'] Object '+item.id+'</div>'+
'<div class="modal-name tier-'+item.tier+'">'+item.name+'</div>'+
'<div class="modal-type">类型：'+({consumable:'消耗品',weapon:'武器',tool:'工具',danger:'危险品',special:'特殊'}[item.type]||item.type)+'</div>'+
'<div class="modal-desc">'+item.desc+'</div>'+
'<div class="modal-stats">'+statsLine+'</div>'+
'<div class="modal-fx">特殊效果：'+fxDesc+'</div>'+fxDetail+
'<div class="modal-btns">'+
'<button class="modal-btn use" onclick="document.querySelector(\'.modal-overlay\').remove();useItem('+idx+')">✦ 使用</button>'+
'<button class="modal-btn drop" onclick="document.querySelector(\'.modal-overlay\').remove();dropItem('+idx+')">✕ 丢弃</button>'+
'<button class="modal-btn cancel" onclick="document.querySelector(\'.modal-overlay\').remove()">返回</button>'+
'</div></div>';
document.body.appendChild(overlay);
}

function dropItem(idx){
var item=S.inv[idx];if(!item)return;
S.inv.splice(idx,1);
al('丢弃了 '+item.name);us();
renderLevel(gl(S.lv),ge(S.lv),null,true,S.pendingObj);
}

function showBuffDetail(key,turns){
var name=ENAMES[key]||key;
var desc=EDESC[key]||'未知效果';
var overlay=document.createElement('div');
overlay.className='modal-overlay';
overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
overlay.innerHTML='<div class="modal"><div class="modal-name" style="font-size:1.2em">'+name+'</div><div class="modal-desc" style="margin:10px 0">'+desc+'</div><div class="modal-stats">剩余回合：'+turns+'</div><button class="settings-close" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div>';
document.body.appendChild(overlay);
}

function startGame(){
document.getElementById('ts').style.display='none';
document.getElementById('gs').style.display='block';
S={lv:0,san:100,sta:100,tn:0,mx:0,vis:new Set(),log:[],evts:0,inv:[],objFound:0,buffs:{},pendingObj:null,debugEventOnly:false};
enterLevel(0);
}
function gl(n){return LD.find(l=>l.level===n)||{level:n,name:"未知",danger:3,exits:[]};}
function ge(n){return EV[String(n)]||null;}
function cl(v,a,b){return Math.max(a,Math.min(b,v));}
function us(){
S.san=cl(S.san,0,100);S.sta=cl(S.sta,0,100);
document.getElementById('sv0').textContent=S.san;
document.getElementById('sv1').textContent=S.sta;
document.getElementById('sv2').textContent=S.lv;
document.getElementById('sv4').textContent=S.inv.length;
var b0=document.getElementById('sb0'),b1=document.getElementById('sb1');
b0.style.width=S.san+'%';b1.style.width=S.sta+'%';
document.getElementById('sb2').style.width=cl(S.lv+1,1,100)+'%';
document.getElementById('sb4').style.width=(S.inv.length/MAX_INV*100)+'%';
b0.style.background=S.san>50?'#8a8':S.san>25?'#ca4':'#c44';
b1.style.background=S.sta>50?'#88a':S.sta>25?'#ca4':'#c44';
document.getElementById('sv0').className='sv '+(S.san>50?'gd':S.san>25?'wn':'dg');
document.getElementById('sv1').className='sv '+(S.sta>50?'gd':S.sta>25?'wn':'dg');
var bh='';
for(var b in S.buffs){if(S.buffs[b]>0)bh+='<span class="buff" onclick="showBuffDetail(\''+b+'\','+S.buffs[b]+')" title="'+(EDESC[b]||'')+'">'+(ENAMES[b]||b)+' ('+S.buffs[b]+')</span> ';}
document.getElementById('buffs').innerHTML=bh;
}
function tickBuffs(){for(var b in S.buffs){S.buffs[b]--;if(S.buffs[b]<=0)delete S.buffs[b];}}
function hasBuff(b){return S.buffs[b]&&S.buffs[b]>0;}
function addBuff(b,n){S.buffs[b]=(S.buffs[b]||0)+n;}
function pickEvent(list){for(var i=0;i<list.length;i++){if(Math.random()<list[i].c)return list[i];}return null;}
function tryFindObject(){
var pool=OB.filter(function(o){return !S.inv.find(function(i){return i.id===o.id;});});
pool=pool.filter(function(o){if(o.levels==='all')return true;return o.levels.split(',').map(Number).indexOf(S.lv)>=0;});
var multi=hasBuff('double_find')?2.5:1;
for(var i=0;i<pool.length;i++){if(Math.random()<pool[i].rarity*multi)return pool[i];}
return null;
}

function applyGamble(item){
var outcomes;
if(item.id===5){outcomes=[{x:'糖果让你短暂失去了触觉，但恐惧感也消失了。',s:8,m:0},{x:'这颗糖果味道很奇怪……你感觉头有点晕。',s:-8,m:-5},{x:'甜蜜的味道让你想起了家。',s:10,m:5},{x:'糖果是苦的！',s:-3,m:-3}];}
else if(item.id===7){outcomes=[{x:'罐中是一段温馨的家庭回忆。温暖涌入心头。',s:15,m:0},{x:'罐中是某人临死前的记忆。纯粹的恐惧。',s:-20,m:-5},{x:'罐中是平凡的日常。有人在阳光下喝咖啡。',s:10,m:5},{x:'罐中是空白的。虚无比恐惧更可怕。',s:-12,m:0}];}
else if(item.id===43){outcomes=[{x:'你抽到了「星星」——希望之牌。温暖充满全身。',s:18,m:15},{x:'你抽到了「塔」——灾难之牌。剧痛袭来。',s:-15,m:-15},{x:'你抽到了「命运之轮」——变化之牌。',s:5,m:5},{x:'你抽到了「月亮」——幻觉之牌。',s:-10,m:0},{x:'你抽到了「太阳」——生命之牌。伤口愈合。',s:10,m:20}];}
else if(item.id===39){outcomes=[{x:'这一页记载了详细的层级出口信息。极其宝贵。',s:12,m:0},{x:'文字开始蠕动变形。你赶紧合上了书。',s:-18,m:0},{x:'这一页是食谱。你学会了补充体力的方法。',s:3,m:18},{x:'空白页上浮现出你自己的脸。',s:-15,m:-5},{x:'写满了鼓励的话。像是逃出去的人留下的。',s:15,m:5}];}
else if(item.id===666){outcomes=[{x:'骰子停在了一个无法理解的符号上。你的身体开始变形……',s:-40,m:-35},{x:'骰子停在了「旅馆」。你被传送到一个锁死的房间里。',s:-25,m:-20},{x:'骰子停在空白面。什么都没发生。也许这是最好的结果。',s:-10,m:-10}];}
else{outcomes=[{x:'发生了意想不到的事。',s:5,m:5},{x:'什么都没发生。',s:0,m:0}];}
var pick=outcomes[Math.floor(Math.random()*outcomes.length)];
S.san+=pick.s;S.sta+=pick.m;
return pick;
}

function useItem(idx){
var item=S.inv[idx];if(!item)return;
S.inv.splice(idx,1);
var msg=item.use,extraMsg='',dSan=item.san,dSta=item.sta;
if(item.effect==='gamble'){var r=applyGamble(item);msg=item.use+r.x;dSan=r.s;dSta=r.m;}
else if(item.effect==='teleport'){S.san+=item.san;S.sta+=item.sta;var t=Math.floor(Math.random()*100);al('迁跃浆果传送到 Level '+t,item.san,item.sta);us();if(S.san<=0||S.sta<=0){gameOver(S.san<=0?'s':'m');return;}enterLevel(t);return;}
else if(item.effect==='shield'){S.san+=item.san;S.sta+=item.sta;addBuff('shield',3);extraMsg='🛡 护盾（3回合减伤50%）';}
else if(item.effect==='detect'){S.san+=item.san;S.sta+=item.sta;addBuff('detect',3);extraMsg='👁 感知（3回合避免危险事件）';}
else if(item.effect==='light'){S.san+=item.san;S.sta+=item.sta;addBuff('light',5);extraMsg='💡 照明（5回合黑暗层级减伤）';}
else if(item.effect==='double_find'){S.san+=item.san;S.sta+=item.sta;addBuff('double_find',3);extraMsg='🍀 幸运（3回合物品发现率x2.5）';}
else if(item.effect==='immunity_sound'){S.san+=item.san;S.sta+=item.sta;addBuff('immunity_sound',4);extraMsg='🔇 静默（4回合免疫声音事件）';}
else if(item.effect==='noclip_boost'){S.san+=item.san;S.sta+=item.sta;addBuff('noclip_boost',2);extraMsg='🌀 切行增幅';}
else if(item.effect==='unlock'){S.san+=item.san;S.sta+=item.sta;var nt=Math.floor(Math.random()*100);var cd=gl(S.lv);if(!cd.exits.find(function(e){return e.target===nt;})){cd.exits.push({target:nt});}extraMsg='🔑 打开了通往 Level '+nt+' 的通道！';}
else if(item.effect==='attract'){S.san+=item.san;S.sta+=item.sta;S.san-=10;S.sta-=8;dSan=item.san-10;dSta=item.sta-8;extraMsg='⚠ 气味吸引了实体！';}
else{S.san+=item.san;S.sta+=item.sta;}
al(item.name+(extraMsg?' — '+extraMsg:''),dSan,dSta);us();
if(S.san<=0||S.sta<=0){gameOver(S.san<=0?'s':'m');return;}
var fullMsg=msg+(extraMsg?'<br><span style="font-size:.85em;opacity:.8">'+extraMsg+'</span>':'');
renderLevel(gl(S.lv),ge(S.lv),{t:dSan>=0&&item.type!=='danger'?'g':'d',x:fullMsg},true,S.pendingObj);
}

function enterLevel(n){
S.lv=n;S.tn++;S.vis.add(n);S.mx=Math.max(S.mx,n);S.pendingObj=null;tickBuffs();
var d=gl(n),ev=ge(n);
var dc=d.danger*3,mc=3+Math.floor(d.danger*1.5);
if(hasBuff('shield')){dc=Math.floor(dc*0.5);mc=Math.floor(mc*0.5);}
if(hasBuff('light')&&[6,7,8].indexOf(n)>=0){dc=Math.floor(dc*0.5);mc=Math.floor(mc*0.5);}
S.san-=dc;S.sta-=mc;
var totalDS=-dc,totalDM=-mc;
var enterEv=null;
if(ev&&ev.enterEvents){
if(hasBuff('detect')){
var safe=ev.enterEvents.filter(function(e){return e.t!=='d';});
enterEv=safe.length>0?pickEvent(safe):{t:'g',x:'感知能力让你提前察觉到危险，成功绕开了威胁。',s:5,m:0,c:1};
}else{enterEv=pickEvent(ev.enterEvents);}
}
if(!enterEv)enterEv=pickEvent(GRE);
if(enterEv){
var es=enterEv.s,em=enterEv.m;
if(hasBuff('shield')&&es<0)es=Math.floor(es*0.5);
if(hasBuff('shield')&&em<0)em=Math.floor(em*0.5);
S.san+=es;S.sta+=em;S.evts++;totalDS+=es;totalDM+=em;
}
us();if(S.san<=0||S.sta<=0){gameOver(S.san<=0?'s':'m');return;}
al('进入 Level '+n+' — '+d.name,totalDS,totalDM);renderLevel(d,ev,enterEv);
}

function doExplore(){
var prevSan=S.san,prevSta=S.sta;
S.tn++;S.sta-=5;tickBuffs();
var ev=ge(S.lv),exploreEv=null;
if(S.debugEventOnly){
// Only trigger level-specific events
if(ev&&ev.exploreEvents&&ev.exploreEvents.length>0){
exploreEv=pickEvent(ev.exploreEvents);
if(!exploreEv)exploreEv=ev.exploreEvents[Math.floor(Math.random()*ev.exploreEvents.length)];
}
if(!exploreEv)exploreEv={t:"n",x:"[调试] 当前层级没有专属探索事件。",s:0,m:0,c:1};
S.san+=exploreEv.s;S.sta+=exploreEv.m;S.evts++;
us();if(S.san<=0||S.sta<=0){gameOver(S.san<=0?'s':'m');return;}
var dS=S.san-prevSan,dM=S.sta-prevSta;
al('[事件测试] '+exploreEv.x.substring(0,20)+'...',dS,dM);
renderLevel(gl(S.lv),ev,exploreEv,true,S.pendingObj);
return;
}
if(ev&&ev.exploreEvents)exploreEv=pickEvent(ev.exploreEvents);
if(!exploreEv)exploreEv={t:"n",x:"你仔细探索了周围，没有特别的发现。",s:-3,m:-5,c:1};
S.san+=exploreEv.s;S.sta+=exploreEv.m;S.evts++;
var foundObj=tryFindObject();if(foundObj){S.objFound++;S.pendingObj=foundObj;}
us();if(S.san<=0||S.sta<=0){gameOver(S.san<=0?'s':'m');return;}
var dS=S.san-prevSan,dM=S.sta-prevSta;
al('探索 Level '+S.lv+(foundObj?' — 发现['+foundObj.tier+']'+foundObj.name:''),dS,dM);
renderLevel(gl(S.lv),ev,exploreEv,true,S.pendingObj);
}

function doRest(){
var prevSan=S.san,prevSta=S.sta;
S.tn++;S.sta+=15;S.san-=5;tickBuffs();
if(Math.random()<.25){
S.san-=10;S.sta-=5;us();
if(S.san<=0||S.sta<=0){gameOver(S.san<=0?'s':'m');return;}
al('休息被打断！',S.san-prevSan,S.sta-prevSta);
renderLevel(gl(S.lv),ge(S.lv),{t:'d',x:'你在休息时听到了异响，不得不紧急起身逃离。'},true);
}else{
us();al('休息恢复',S.san-prevSan,S.sta-prevSta);
renderLevel(gl(S.lv),ge(S.lv),{t:'g',x:'你找到了一个安全的角落，短暂休息后好了一些。'},true);
}
}

function renderLevel(d,ev,trigEv,noDesc,foundObj){
var c=document.getElementById('gcon');
var dc='d'+d.danger;
var desc=ev&&ev.description?ev.description:'Level '+d.level+' — '+d.name+'。你小心翼翼地打量着周围。';
var h='<div class="lh" style="animation:fi .5s"><div class="ln">LEVEL '+d.level+'</div><div class="lnm">'+(d.name||'???')+'</div><div class="ld '+dc+'">▸ 危险等级：'+'█'.repeat(d.danger)+'░'.repeat(5-d.danger)+' '+DL[d.danger]+'</div></div>';
if(!noDesc)h+='<div class="nar" style="animation:fi .8s">'+desc+'</div>';
if(trigEv){var ec=trigEv.t==='d'?'de':trigEv.t==='g'?'ge':'';h+='<div class="evt '+ec+'" style="animation:fi 1s">'+trigEv.x+'</div>';}
if(foundObj){
var tierName=TC[foundObj.tier]||'?';
var fxDesc=foundObj.effect&&ENAMES[foundObj.effect]?ENAMES[foundObj.effect]:'无';
h+='<div class="obj-find" style="animation:fi 1.2s"><span class="obj-name tier-'+foundObj.tier+'">📦 ['+tierName+'] '+foundObj.name+'</span><div class="obj-desc">'+foundObj.desc+'</div>';
if(foundObj.effect)h+='<div class="obj-fx">特殊效果：'+fxDesc+'</div>';
if(S.inv.length<MAX_INV){h+='<button class="cb item" style="margin-top:8px" onclick="pickupObj('+foundObj.id+')">▸ 拾取 '+foundObj.name+'<span class="ch">放入背包 ('+S.inv.length+'/'+MAX_INV+')</span></button>';}
else{h+='<div style="opacity:.7;font-size:.8em;margin-top:5px">⚠ 背包已满 — 丢弃物品后可拾取</div>';}
h+='</div>';
}
if(S.inv.length>0){
h+='<div class="inv"><div class="inv-title">🎒 背包 ('+S.inv.length+'/'+MAX_INV+') — 点击查看详情</div><div class="inv-grid">';
S.inv.forEach(function(item,i){h+='<span class="inv-item tier-'+item.tier+'" onclick="showItemModal('+i+')">'+item.name+'</span>';});
h+='</div></div>';
}
h+='<div class="chs" style="animation:fi 1.2s">';
var exploreLabel=S.debugEventOnly?'🔍 触发层级事件':'🔍 探索当前层级';
var exploreHint=S.debugEventOnly?'仅触发当前层级专属事件':'体力 -5 | 可能发现物品和事件'+(hasBuff('double_find')?' | 🍀幸运':'');
h+='<button class="cb explore" onclick="doExplore()">'+exploreLabel+'<span class="ch">'+exploreHint+'</span></button>';
if(S.sta<60)h+='<button class="cb rest" onclick="doRest()">💤 就地休息<span class="ch">体力 +15 | 理智 -5 | 25%遭遇危险</span></button>';
h+='<hr class="sep">';
var ex=d.exits.filter(function(e){return e.target>=0&&e.target<=99;});
for(var i=0;i<ex.length;i++){
var td=gl(ex[i].target),dh=DL[td.danger],vi=S.vis.has(ex[i].target)?' [已探索]':'';
var sc=td.danger*3,mc2=3+Math.floor(td.danger*1.5);
if(hasBuff('shield')){sc=Math.floor(sc*0.5);mc2=Math.floor(mc2*0.5);}
h+='<button class="cb" onclick="enterLevel('+ex[i].target+')">▸ Level '+ex[i].target+' — '+td.name+vi+'<span class="ch">'+dh+' | 🧠-'+sc+' 💪-'+mc2+'</span></button>';
}
var et=cl(d.level+Math.floor(Math.random()*20)-10,0,99);
if(!ex.find(function(e){return e.target===et;})){
var etd=gl(et),esc=etd.danger*3+5,emc=8+Math.floor(etd.danger*2);
if(hasBuff('noclip_boost')){esc=Math.floor(esc*0.5);emc=Math.floor(emc*0.5);}
h+='<button class="cb" onclick="enterLevel('+et+')">▸ 尝试切出（noclip）<span class="ch">目标未知 | 🧠-'+esc+' 💪-'+emc+(hasBuff('noclip_boost')?' 🌀':'')+'</span></button>';
}
h+='</div>';
c.innerHTML=h;
window.scrollTo({top:0,behavior:'smooth'});
}

window.pickupObj=function(id){
if(S.inv.length>=MAX_INV)return;
var obj=OB.find(function(o){return o.id===id;});
if(obj){var copy={};for(var k in obj)copy[k]=obj[k];S.inv.push(copy);S.pendingObj=null;al('拾取 ['+obj.tier+'] '+obj.name);us();renderLevel(gl(S.lv),ge(S.lv),null,true);}
};

function gameOver(cause){
var reasons={s:'你的理智已经完全崩溃。你忘记了自己是谁。你成为了后室的一部分。',m:'你的体力耗尽，再也无法迈出下一步。意识逐渐模糊……'};
var invList=S.inv.map(function(i){return '['+i.tier+']'+i.name;}).join(' · ')||'无';
document.getElementById('gcon').innerHTML='<div id="go"><h2>你 已 死 亡</h2><div class="dc">'+reasons[cause]+'</div><div class="fs">存活回合：'+S.tn+'<br>最深层级：Level '+S.mx+'<br>探索层级数：'+S.vis.size+'<br>触发事件：'+S.evts+'<br>发现物品：'+S.objFound+'<br>遗物：'+invList+'<br>最终位置：Level '+S.lv+' — '+gl(S.lv).name+'</div><button class="rb" onclick="startGame()">▶ 重新开始</button><div style="margin-top:15px;font-size:.8em;opacity:.5">也许这次能走得更远……</div></div>';
document.getElementById('hl').innerHTML='';document.getElementById('buffs').innerHTML='';
}

// Init
loadCfg();applyTheme();

</script>
