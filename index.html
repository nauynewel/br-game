const EV={"0": {"description": "你睁开眼，发现自己身处一片无尽的黄色房间中。潮湿的地毯散发着霉味，荧光灯嗡嗡作响。大约六亿平方英里随机分割的空荡房间，没有窗户，没有出口。欢迎来到后室。", "enterEvents": [{"t": "d", "x": "你误入了一间有着红色墙纸和昏暗灯光的房间。一股强烈的不安感瞬间笼罩了你——绝对不能待在这里！你转身就跑。", "s": -25, "m": -15, "c": 0.04}, {"t": "d", "x": "你确信看到了另一个流浪者的身影。但你想起来——Level 0里不应该有其他人类。那不是人。", "s": -20, "m": -5, "c": 0.08}, {"t": "n", "x": "荧光灯的嗡鸣声突然增大到震耳欲聋的程度，你捂住耳朵蹲在地上。然后，一切突然归于死寂。", "s": -10, "m": -3, "c": 0.15}, {"t": "n", "x": "你产生了强烈的既视感。这个房间……你确定自己来过。但沿原路返回时，一切都变了。", "s": -8, "m": -2, "c": 0.15}, {"t": "n", "x": "用余光你看到墙纸下有什么东西在蠕动爬行。当你直接注视时，墙壁又恢复了平静。", "s": -8, "m": 0, "c": 0.12}, {"t": "n", "x": "你听到了类似人类说话的声音，但内容不属于任何已知语言。声音时远时近。", "s": -10, "m": 0, "c": 0.1}], "exploreEvents": [{"t": "g", "x": "经过漫长的跋涉，你发现了传说中的马尼拉房间！这里有其他流浪者，还有M.E.G.留下的文档。你获得了关于后室的关键信息，也感受到了不再孤独的温暖。", "s": 20, "m": 15, "c": 0.06}, {"t": "n", "x": "你观察到一扇门凭空出现在墙壁上，但当你靠近时它消失了。这只是Level 0常见的幻觉。", "s": -5, "m": -2, "c": 0.1}, {"t": "d", "x": "你试图饮用浸湿地毯的液体来解渴，但它不是水。喝下后你感到强烈的恶心。", "s": -5, "m": -15, "c": 0.05}]}, "1": {"description": "Level 1，「宜居地带」。这个地方让你感到不安，但你必须继续前进。", "enterEvents": [{"t": "n", "x": "一种难以名状的不安感笼罩着你。你加快了脚步。", "s": -5, "m": -5, "c": 0.15}, {"t": "d", "x": "你听到了不该存在的声音。直觉告诉你这里不安全。", "s": -12, "m": -8, "c": 0.1}], "exploreEvents": [{"t": "g", "x": "你在 Level 1 深处发现了一个相对安全的区域。短暂休整让你恢复了一些精力。", "s": 8, "m": 12, "c": 0.07}, {"t": "d", "x": "你探索得太深了。返回时周围环境已变，你花了很长时间才脱身。", "s": -10, "m": -12, "c": 0.08}]}, "2": {"description": "你踏入了 Level 2——「废弃公共带」。四周的景象与之前截然不同。你不知道这是好事还是坏事。", "enterEvents": [{"t": "d", "x": "Level 2中潜伏着未知实体。你听到了它们的声音，必须尽快隐蔽。", "s": -15, "m": -10, "c": 0.12}, {"t": "d", "x": "四周陷入黑暗，你不得不在看不见的环境中艰难前行。", "s": -12, "m": -8, "c": 0.14}, {"t": "n", "x": "这里到处都是水。潮湿的环境让你的衣物越来越沉重。", "s": -5, "m": -10, "c": 0.12}, {"t": "d", "x": "极端的高温让你大量出汗，身体迅速脱水。", "s": -8, "m": -18, "c": 0.1}, {"t": "d", "x": "刺骨的寒冷侵入骨髓。你的手指开始失去知觉。", "s": -8, "m": -15, "c": 0.1}, {"t": "g", "x": "这里的氛围出奇地平和。你紧绷的神经终于放松了一些。", "s": 10, "m": 8, "c": 0.12}, {"t": "n", "x": "持续不断的噪音让你的头隐隐作痛。", "s": -8, "m": -3 function init(){S={lv:0,san:100,sta:100,tn:0,mx:0,vis:new Set(),log:[],evts:0,inv:[],of:0};}

function cl(v,a,b){return Math.max(a,Math.min(b,v));}

if(!ca.length){let ks=Object.keys(OB);ca.push({id:ks[Math.floor(Math.random()*ks.length)],...OB[ks[Math.floor(Math.random()*ks.length)]]});}
for(const c of ca.sort(()=>Math.random()-.5)){if(Math.random()<c.r)return c;}
return null;
}

function enterLevel(n){
S.lv=n;S.tn++;S.vis.add(n);S.mx=Math.max(S.mx,n);
let d=gl(n),ev=ge(n),dc=d.danger*3;
S.san-=dc;S.sta-=(3+Math.floor(d.danger*1.5));
let ee=null;if(ev&&ev.enterEvents)ee=pe(ev.enterEvents);if(!ee)ee=pe(GRE);
if(ee){S.san+=ee.s;S.sta+=ee.m;S.evts++;}
let fo=fol(n);us();

al('进入 Level '+n+' - '+d.name);renderLevel(d,ev,ee,false,fo);
}

al('探索 Level '+S.lv);renderLevel(gl(S.lv),ev,ee,true,fo);
}
function doRest(){
S.tn++;S.sta+=15;S.san-=5;

}
function gameOver(cause){
let r={s:'你的理智已经完全崩溃。你忘记了自己是谁，为什么在这里。你成为了后室的一部分。',m:'你的体力耗尽，再也无法迈出下一步。你倒在了冰冷的地面上，意识逐渐模糊……'};
let iv=S.inv.length>0?'<br>遗物：'+S.inv.map(i=>i.name).join('、'):'';
document.getElementById('gcon').innerHTML='<div id="go"><h2>你 已 死 亡</h2><div class="dc">'+r[cause]+'</div><div class="fs">存活回合：'+S.tn+'<br>到达最深层级：Level '+S.mx+'<br>探索层级数：'+S.vis.size+'<br>触发事件数：'+S.evts+'<br>发现物品数：'+S.of+'<br>最终位置：Level '+S.lv+' - '+gl(S.lv).name+iv+'</div><button class="rb" onclick="startGame()">▶ 重新开始</button><div style="margin-top:15px;font-size:.8em;color:#4a4830">也许这次能走得更远……</div></div>';
document.getElementById('hl').innerHTML='';
}</script>
